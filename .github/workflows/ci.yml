# This repo's CI: framework quality gates + the full chaos-harness acceptance
# test (fully offline — mock LLM), then the reusable Sentinel workflow running
# the demo suite sharded with cache persistence.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm format:check
      - run: node scripts/validate-workflows.mjs
      - run: pnpm test
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
        working-directory: examples/tests
      - name: Chaos-harness acceptance test (spec §11.2)
        run: pnpm chaos
        env:
          SENTINEL_LLM_PROVIDER: none

  e2e:
    # Exercises the reusable workflow for real: sharding, cache persistence,
    # report artifact, summary comment. Runs deterministic-only unless the
    # SENTINEL_LLM_API_KEY secret is configured (graceful degradation, spec §9).
    permissions:
      contents: read
      pull-requests: write
      issues: write
      checks: write
    uses: ./.github/workflows/sentinel.yml
    with:
      working-directory: examples/tests
      shard-list: '[1,2]'
      shard-total: 2
    secrets:
      SENTINEL_LLM_API_KEY: ${{ secrets.SENTINEL_LLM_API_KEY }}
